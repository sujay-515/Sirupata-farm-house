# docker-compose.yml
version: '3.8'

services:
  # MySQL database service
  db:
    image: mysql:8.0
    container_name: sirupata_mysql
    restart: always
    ports:
      - "3307:3306"  # Use port 3307 on host to avoid conflicts
    environment:
      MYSQL_ROOT_PASSWORD: Password
      MYSQL_DATABASE: sirupata_db
      MYSQL_USER: sirupata_user
      MYSQL_PASSWORD: sirupata_pass123
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sirupata_network
    command: --default-authentication-plugin=mysql_native_password

  # Django web application
  web:
    build: .
    container_name: sirupata_web
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    environment:
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=sirupata_db
      - DB_USER=sirupata_user
      - DB_PASSWORD=sirupata_pass123
      - DB_HOST=db  # This points to the db service
      - DB_PORT=3306
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - SECRET_KEY=${SECRET_KEY:-dev-only-change-me}
      - DEBUG=True
      - SITE_URL=http://localhost:8000
      - SITE_NAME=Sirupata R Star
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME:-admin}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD:-admin12345}
    depends_on:
      - db
    networks:
      - sirupata_network
    command: >
      sh -c "
      echo 'Waiting for database...' &&
      sleep 10 &&
      python manage.py migrate &&
      python manage.py seed_demo_content &&
      python manage.py runserver 0.0.0.0:8000
      "

# Volumes for persistent data
volumes:
  mysql_data:
  static_volume:

# Network
networks:
  sirupata_network:
    driver: bridge
